# ==========================================
# Spring Boot Application Properties
# Portfolio Backend Configuration
# ==========================================

# Server Configuration
server.port=8080
server.servlet.context-path=/
server.error.include-message=always
server.error.include-stacktrace=on_param

# Application Name
spring.application.name=portfolio-backend
spring.config.name=application

# ==========================================
# DATABASE CONFIGURATION
# ==========================================

# H2 Database (For Development/Testing)
spring.datasource.url=jdbc:h2:mem:portfoliodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# For Production - MySQL Configuration
# spring.datasource.url=jdbc:mysql://localhost:3306/portfolio_db
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# For MySQL - Uncomment these
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# spring.jpa.hibernate.ddl-auto=update

# H2 Console (Only for Development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# LOGGING CONFIGURATION
# ==========================================

logging.level.root=INFO
logging.level.com.manojgr.portfolio=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==========================================
# JACKSON CONFIGURATION
# ==========================================

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ==========================================
# MAIL CONFIGURATION (Optional)
# ==========================================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ==========================================
# SECURITY CONFIGURATION
# ==========================================

# JWT Secret Key (Change this to a secure random string)
jwt.secret=your_super_secret_jwt_key_change_this_in_production
jwt.expiration=86400000

# ==========================================
# ACTUATOR CONFIGURATION (Optional)
# ==========================================

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ==========================================
# CUSTOM APPLICATION PROPERTIES
# ==========================================

# Portfolio Owner Name
app.owner.name=Manoj G R
app.owner.email=manoj.gr@example.com

# API Version
app.api.version=1.0.0

# ==========================================
# DEVELOPMENT MODE
# ==========================================

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
